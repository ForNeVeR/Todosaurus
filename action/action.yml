name: Todosaurus
# IgnoreTODO-Start
description: Check the TODO comments in the repository according to the validation rules in the configuration file.
# IgnoreTODO-End
branding:
  icon: list
  color: yellow

inputs:
  config:
    description: Path to the configuration file.
    required: false

  strict:
    description: Enable strict mode for validation.
    required: false
    default: "false"

  github-token:
    description: Token to fetch the issues from the current repository. Helps to avoid rate-limiting by GitHub.
    required: false

  build-from-source:
    description: Build from source instead of installing the NuGet tool.
    required: false
    default: "false"

  version:
    description: Version of the NuGet tool to install (when build-from-source is false).
    required: false
    default: "1.10.1"

runs:
  using: composite
  steps:
    - name: Set up .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: ${{ github.action_path }}/../global.json

    - name: Install Todosaurus
      if: inputs.build-from-source != 'true'
      shell: pwsh
      run: dotnet tool install --global FVNever.Todosaurus.Cli --version ${{ inputs.version }}

    - name: Run Todosaurus (tool)
      if: inputs.build-from-source != 'true'
      shell: pwsh
      run: todosaurus scan ${{ inputs.config && '--config $env:CONFIG_PATH' || '' }} ${{ inputs.strict == 'true' && '--strict' || '' }}
      env:
        CONFIG_PATH: ${{ inputs.config }}
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Run Todosaurus (from source)
      if: inputs.build-from-source == 'true'
      shell: pwsh
      working-directory: ${{ github.action_path }}
      run: dotnet run --project ../cli/Cli/Cli.fsproj -- scan ${{ inputs.config && '--config $env:CONFIG_PATH' || '' }} ${{ inputs.strict == 'true' && '--strict' || '' }}
      env:
        CONFIG_PATH: ${{ inputs.config }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
